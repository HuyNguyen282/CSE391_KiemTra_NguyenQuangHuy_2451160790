<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý danh sách sản phẩm</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="container">

        <header>
            <div class="app-header">
                <h1>Hệ thống quản lý hồ sơ chuyển đổi số</h1>
                <p>Sở Giáo dục & Đào tạo - Ứng dụng quản lý tiến trình chuyển đổi số các trường học</p>
            </div>
        </header>
        <main>
        <div class="main-layout">


            <div class="card-section">
                <h5>+Thêm hồ sơ mới</h5>

                <form id="product-form" novalidate>

                    <div class="form-group">
                        <label for="inp-name">Tên trường</label>
                        <input type="text" id="inp-name" placeholder="VD: Trường THPT Nguyễn Huệ" />
                    </div>

                    <div class="form-group">
                        <label for="inp-category">Đơn vị quản lý</label>
                        <select id="inp-category">
                            <option value="">-- Chọn đơn vị --</option>
                            <option>Phòng GD&ĐT TP. Thủy Lợi</option>
                            <option>Phòng GD&ĐT H. Thủy Nguyên</option>
                            <option>Phòng GD&ĐT Q. Hồng Bàng</option>
                            <option>Phòng GD&ĐT Q. Ngô Quyềnn</option>

                        </select>
                    </div>

                    <div class="form-group">
                        <label for="inp-trangthai">Trạng thái chuyển đổi</label>
                        <select id="inp-trangthai">
                            <option value="">-- Chọn trạng thái --</option>
                            <option value="chua-bat-dau">Chưa bắt đầu</option>
                            <option value="dang-trien-khai">Đang triển khai</option>
                            <option value="hoan-thanh">Hoàn thành</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="inp-mota">Mô tả tiến độ</label>
                        <textarea id="inp-mota" style="font-family: 'Times New Roman', Times, serif;"
                            placeholder="Mô tả tình hình chuyển đổi số..."></textarea>
                    </div>

                    <div class="btn-group">
                        <button type="submit" class="btn-primary">+ Thêm hồ sơ</button>
                    </div>

                </form>
            </div>


            <div class="content-panel">
                <div class="filter-bar">
                    <div class="tabs">
                        <button class="tab-btn active" data-filter="tat-ca">Tất cả</button>
                        <button class="tab-btn" data-filter="chua-bat-dau">Chưa bắt đầu</button>
                        <button class="tab-btn" data-filter="dang-trien-khai">Đang triển khai</button>
                        <button class="tab-btn" data-filter="hoan-thanh">Hoàn thành</button>
                    </div>
                    <span class="total-badge" id="total-badge">0 hồ sơ</span>
                </div>
                <div class="record-list" id="record-list"></div>
            </div>

        </div>
    </div>
    </main>
    <script src="data/data.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
